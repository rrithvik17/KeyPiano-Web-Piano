<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyPiano | Professional Browser Piano</title>
    <meta name="description" content="A high-performance, polished browser-based piano playable entirely with your keyboard.">
    <link rel="stylesheet" href="src/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader-content">
            <div class="piano-icon">🎹</div>
            <h2>Pre-caching Grand Piano Assets...</h2>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <p>Fetching real samples & concert acoustics</p>
        </div>
    </div>
    
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">🎹</span>
                <h1>KeyPiano</h1>
            </div>
            <div class="controls-top">
                <div class="control-group">
                    <label for="volume">Volume</label>
                    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
                </div>
                <div class="control-group">
                    <label for="reverb">Reverb</label>
                    <input type="range" id="reverb" min="0" max="0.8" step="0.01" value="0.3">
                </div>

            </div>
        </header>

        <main>
            <div class="status-panel">
                <div class="current-note" id="current-note">Press a key to play</div>
                <div class="recording-indicator" id="recording-indicator">
                    <span class="dot"></span>
                    <span class="text">REC</span>
                </div>
            </div>

            <div class="piano-wrapper">
                <div id="piano" class="piano"></div>
            </div>

            <div class="controls-bottom">
                <div class="action-buttons">
                    <button id="sustain-btn" class="toggle-btn">Sustain (Space)</button>
                    <button id="smart-looper" class="looper-btn">Start Recording</button>
                </div>
                <div class="octave-controls">
                    <button id="octave-down">Octave -</button>
                    <span id="octave-display">Octave: 4</span>
                    <button id="octave-up">Octave +</button>
                </div>
            </div>
        </main>

        <footer>
            <p><strong>Z-/</strong>: Low | <strong>A-'</strong>: Mid | <strong>Q-]</strong>: High | <strong>1-=</strong>: Top | <strong>Space</strong>: Sustain</p>
        </footer>
    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
